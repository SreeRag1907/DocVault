# /etc/nginx/sites-available/docvault

server {
    listen 80;
    server_name _;

    root /var/www/docvault/frontend/dist;
    index index.html;

    client_max_body_size 0; # uploads go straight to S3, not through Nginx - no practical limit needed here

    # Both "/" (the dashboard) and "/s/:token" (the public share page)
    # are client-side React Router routes, so any path that isn't a
    # real static file falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|svg|png|jpg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
